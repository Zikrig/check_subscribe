version: "3.9"

services:
  bot:
    build: .
    container_name: promo_bot_max
    restart: always
    env_file:
      - .env
    # JSON-хранилище в именованном томе — переживает docker compose build/up без потери данных
    environment:
      DATA_JSON_PATH: /app/data/store.json
    volumes:
      - .:/app
      - bot_data:/app/data
    dns:
      - 1.1.1.1
      - 8.8.8.8

volumes:
  bot_data:
