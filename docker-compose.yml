version: "3.9"

services:
  bot:
    build: .
    container_name: promo_bot
    restart: always
    env_file:
      - .env
    environment:
      SQLITE_PATH: /app/data/promos.db
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    volumes:
      - .:/app
      - ./data:/app/data
    dns:
      - 1.1.1.1
      - 8.8.8.8
